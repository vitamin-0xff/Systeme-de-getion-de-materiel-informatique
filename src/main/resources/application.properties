spring.application.name=hardwaremanagementsystem

spring.datasource.url=jdbc:postgresql://localhost:5432/management_solution_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
springdoc.swagger-ui.path=/swagger-ui.html

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

minio.config.username=admin
minio.config.secret=admin_admin
minio.config.host=http://localhost:9007
minio.config.port=9007-
mini.config.bucket=hms-bucket
